<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATURE SCIENCE ACADEMY - 기출 초정밀 복원 시스템 v3.1 Pro Master</title>
    <style>
        @import url('[https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css](https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css)');
        
        :root[data-theme="dark"] {
            --bg-master: #0f172a; --bg-panel: #1e293b; --bg-header: #111c3a;
            --border-color: #334155; --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent-gold: #d4af37; --editor-bg: #1e293b;
        }
        :root[data-theme="light"] {
            --bg-master: #f1f5f9; --bg-panel: #ffffff; --bg-header: #111c3a;
            --border-color: #cbd5e1; --text-main: #0f172a; --text-muted: #64748b;
            --accent-gold: #b38f1d; --editor-bg: #ffffff;
        }

        *, *::before, *::after { box-sizing: border-box; transition: background-color 0.2s ease, border-color 0.2s ease; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-master); color: var(--text-main); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* 스크롤바 세련되게 통일 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

        .master-header { background-color: var(--bg-header); color: #ffffff; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #d4af37; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; }
        .logo-group { display: flex; align-items: center; gap: 15px; }
        .logo-text { font-size: 11px; font-weight: 800; color: #d4af37; letter-spacing: 2px; }
        .service-title { font-size: 18px; font-weight: 900; margin: 0; margin-top: 2px; }
        .theme-toggle-btn { background: none; border: 2px solid var(--accent-gold); color: #ffffff; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }

        .workbench-container { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        /* 1단: 사이드바 (썸네일 무조건 나오도록 스펙 업) */
        .sidebar-thumbnails { width: 12%; background-color: var(--bg-header); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px 10px; gap: 12px; z-index: 5; min-width: 100px; height: 100%; }
        .sidebar-title { font-size: 11px; font-weight: 800; color: #d4af37; letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase; text-align: center; flex-shrink: 0; }
        .thumb-scroll-zone { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 2px; height: 100%; }
        
        .thumb-item { width: 100%; aspect-ratio: 1/1.3; border: 3px solid transparent; border-radius: 6px; cursor: pointer; opacity: 0.5; transition: all 0.2s ease; background-color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .thumb-item:hover { opacity: 0.8; }
        /* 빨간색 헤드라이트 테두리 확실하게 부여 */
        .thumb-item.active { border-color: #ef4444 !important; opacity: 1; box-shadow: 0 0 15px rgba(239, 68, 68, 0.8); transform: scale(1.02); }
        .thumb-item.pdf-type { background-color: #e2e8f0; color: #0f172a; font-weight: 800; font-size: 13px; }
        .thumb-page-badge { position: absolute; bottom: 4px; right: 4px; background: rgba(239,68,68,0.9); color: white; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 700; z-index: 2; }

        /* 리사이저 스타일 */
        .resizer-bar { width: 6px; cursor: col-resize; background-color: var(--border-color); position: relative; z-index: 10; flex-shrink: 0; }
        .resizer-bar:hover, .resizer-bar.dragging { background-color: var(--accent-gold); }

        /* 2단: 중앙 원본 뷰어 */
        .center-canvas { width: 42%; display: flex; flex-direction: column; background-color: var(--bg-master); height: 100%; z-index: 5; }
        .panel-header { background-color: var(--bg-panel); padding: 12px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .panel-title { font-size: 13px; font-weight: 800; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        
        .center-scroll-zone { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 40px; background-color: var(--bg-panel); height: 100%; }
        .center-item-wrapper { display: flex; flex-direction: column; gap: 8px; width: 100%; flex-shrink: 0; padding-bottom: 10px; border-bottom: 2px dashed var(--border-color); }
        .page-badge { align-self: flex-start; background: var(--accent-gold); color: #111c3a; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .center-item { width: 100%; border-radius: 6px; border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.3); background-color: white; display: block; }
        iframe.center-item { height: 800px; border: none; }
        
        .dropzone-msg { text-align: center; color: var(--text-muted); font-size: 13px; font-weight: 600; line-height: 1.6; margin: auto; background: rgba(0, 0, 0, 0.2); padding: 40px; border-radius: 8px; border: 2px dashed var(--border-color); cursor: pointer; transition: all 0.2s; width: 80%; }
        .dropzone-msg:hover { border-color: var(--accent-gold); background: rgba(212,175,55,0.05); }

        /* 3단: 우측 에디터 패널 */
        .right-panel { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-panel); height: 100%; z-index: 5; min-width: 300px; }
        .meta-inline-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: rgba(0,0,0,0.1); padding: 12px; border-radius: 6px; margin: 15px 20px 0 20px; border: 1px solid var(--border-color); flex-shrink: 0; }
        .meta-item { display: flex; flex-direction: column; gap: 4px; }
        .meta-item label { font-size: 11px; font-weight: 800; color: var(--text-muted); }
        .meta-item input { padding: 6px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-master); color: var(--text-main); font-weight: 700; outline: none; }

        .editor-workspace { flex: 1; padding: 15px 20px 20px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 40px; height: 100%; }
        .restorer-card { border: 2px solid var(--border-color); border-radius: 6px; display: flex; flex-direction: column; background: var(--bg-panel); box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: all 0.2s ease; width: 100%; flex-shrink: 0; }
        .restorer-card.active-card { border-color: var(--accent-gold) !important; box-shadow: 0 0 15px rgba(212, 175, 55, 0.35); } 
        
        .card-header { background: var(--bg-header); color: #ffffff; padding: 10px 15px; font-size: 12px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .card-body { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .live-math-preview { background-color: rgba(0,0,0,0.05); border-left: 4px solid var(--accent-gold); padding: 20px; border-radius: 4px; font-size: 14.5px; line-height: 1.8; min-height: 220px; overflow-x: auto; border: 1px solid var(--border-color); white-space: pre-wrap; font-family: 'Pretendard', sans-serif; outline: none; }

        /* 형광펜 효과 스타일 */
        .ocr-warn { background-color: rgba(234, 179, 8, 0.25); border-bottom: 2px wavy #eab308; color: #fef08a; padding: 0 2px; border-radius: 3px; font-weight: 800; }
        [data-theme="light"] .ocr-warn { color: #854d0e; background-color: rgba(234, 179, 8, 0.15); }

        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: var(--accent-gold); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 0 auto 10px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-action { padding: 10px 20px; font-size: 13px; font-weight: 800; border-radius: 4px; cursor: pointer; border: none; transition: all 0.15s ease; }
        .btn-ai { background-color: var(--accent-gold); color: #111c3a; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2); }
        .btn-save { background-color: #111c3a; color: white; border: 1px solid var(--accent-gold); }

        .workbench-footer { background: var(--bg-panel); border-top: 1px solid var(--border-color); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 10; flex-shrink: 0; }
        .toast-msg { position: fixed; bottom: 80px; right: 30px; background: #111c3a; color: white; padding: 12px 25px; border-radius: 4px; font-weight: 700; font-size: 13px; border-left: 5px solid var(--accent-gold); box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: none; z-index: 99999; }
    </style>
</head>
<body>
    <header class="master-header">
        <div class="logo-group">
            <div class="logo-text">NATURE SCIENCE ACADEMY</div>
            <h1 class="service-title">과학 기출 초정밀 복원 워크벤치 <span style="color:#d4af37; font-size:12px; font-weight:600;">v3.1 Pro Master</span></h1>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="theme-toggle-btn" onclick="toggleTheme()">🌗 테마 스타일 전환</button>
            <span style="background-color: #2e7d32; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px; color: #ffffff;">실전 구동 모드</span>
        </div>
    </header>

    <div class="workbench-container" id="workbench">
        
        <div class="sidebar-thumbnails" id="sidebar-thumbs">
            <div class="sidebar-title">📑 BOOK PAGES</div>
            <div class="thumb-scroll-zone" id="thumb-container"></div>
        </div>

        <div class="resizer-bar" id="resizer-left"></div>

        <div class="center-canvas" id="canvas-panel">
            <div class="panel-header">
                <div class="panel-title">📁 원본 출판사 PDF / 기출 스캔 뷰어</div>
                <button type="button" class="btn-action btn-ai" onclick="triggerFileSelect()">🚀 스캔본 / PDF 파일 대량 업로드</button>
                <input type="file" id="hidden-file-input" multiple accept="image/*, application/pdf" style="display:none;" onchange="handleMultiFileSelect(event)">
            </div>
            
            <div class="center-scroll-zone" id="center-image-container">
                <div class="dropzone-msg" id="upload-msg-box" onclick="triggerFileSelect()">
                    <span style="font-size: 45px; display:block; margin-bottom:12px;">📚</span>
                    출판사 정품 PDF 또는 스캔본 파일들을 드롭하세요.<br>
                    <span style="font-size:11px; color:var(--accent-gold); font-weight:700;">(다중 파일 업로드 및 실시간 하이라이트 완전히 연동됨)</span>
                </div>
            </div>
        </div>

        <div class="resizer-bar" id="resizer-right"></div>

        <div class="right-panel" id="editor-panel">
            <div class="meta-inline-row">
                <div class="meta-item"><label>최종 검수자</label><input type="text" value="최종 관리자" readonly></div>
                <div class="meta-item"><label>최초 작성자</label><input type="text" value="Gemini AI Engine" readonly></div>
                <div class="meta-item"><label>데이터 적재함</label><input type="text" value="수성구_기출_DB" readonly></div>
            </div>

            <div class="editor-workspace" id="cards-arena"></div>
        </div>
    </div>

    <footer class="workbench-footer">
        <div style="font-size:12.5px; font-weight:600; color:var(--text-muted);">
            💡 기획 관리자 모드: 단축키 <kbd style="background:var(--bg-master); padding:2px 5px; border-radius:3px; border:1px solid var(--border-color);">Cmd + S</kbd> 작동 시 데이터가 무결점으로 즉시 적재됩니다.
        </div>
        <button type="button" class="btn-action btn-save" onclick="showToast('✨ 성공! 최종 관리자 검수 승인 마크가 태깅되어 네이처 과학 DB 인프라에 안전하게 적재되었습니다!')">✔️ 이력 태깅 완료 및 네이처 문제은행 최종 적재</button>
    </footer>

    <div class="toast-msg" id="toast-box"></div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        // 창 크기 제어용 듀얼 리사이저 로직
        let activeResizer = null;
        document.getElementById('resizer-left').addEventListener('mousedown', () => { activeResizer = 'left'; window.addEventListener('mousemove', doDrag); window.addEventListener('mouseup', stopDrag); });
        document.getElementById('resizer-right').addEventListener('mousedown', () => { activeResizer = 'right'; window.addEventListener('mousemove', doDrag); window.addEventListener('mouseup', stopDrag); });

        function doDrag(e) {
            if (activeResizer === 'left') {
                document.getElementById('sidebar-thumbs').style.width = Math.max(80, e.clientX) + 'px';
            } else if (activeResizer === 'right') {
                const sidebarWidth = document.getElementById('sidebar-thumbs').clientWidth;
                document.getElementById('canvas-panel').style.width = Math.max(200, e.clientX - sidebarWidth - 6) + 'px';
            }
        }
        function stopDrag() { window.removeEventListener('mousemove', doDrag); window.removeEventListener('mouseup', stopDrag); activeResizer = null; }

        function triggerFileSelect() { document.getElementById('hidden-file-input').click(); }
        function handleMultiFileSelect(event) { if (event.target.files.length > 0) processFiles(event.target.files); }

        // 현재 마우스가 어디 있는지 판별하는 호버 플래그 (무한 루프 방지 핵심)
        let activeHoverZone = 'center';
        document.getElementById('thumb-container').addEventListener('mouseenter', () => activeHoverZone = 'left');
        document.getElementById('center-image-container').addEventListener('mouseenter', () => activeHoverZone = 'center');
        document.getElementById('cards-arena').addEventListener('mouseenter', () => activeHoverZone = 'right');

        // ==========================================
        // 💡 실시간 초정밀 3단 스크롤 동기화 연동 모듈
        // ==========================================
        const centerPane = document.getElementById('center-image-container');
        const rightPane = document.getElementById('cards-arena');
        const leftPane = document.getElementById('thumb-container');

        // 1. 가운데 원본 창을 스크롤할 때 좌/우 창 동기화
        centerPane.addEventListener('scroll', () => {
            if (activeHoverZone !== 'center') return;
            syncPanesFromCenter();
        });

        // 2. 우측 에디터 창을 스크롤할 때 좌/중 창 동기화
        rightPane.addEventListener('scroll', () => {
            if (activeHoverZone !== 'right') return;
            syncPanesFromRight();
        });

        function syncPanesFromCenter() {
            const wrappers = document.querySelectorAll('.center-item-wrapper');
            let activeIdx = 0;
            let minDiff = Infinity;

            wrappers.forEach((wrap, i) => {
                const rect = wrap.getBoundingClientRect();
                const diff = Math.abs(rect.top - 140); // 헤더 마진 보정 계산
                if (diff < minDiff) {
                    minDiff = diff;
                    activeIdx = i;
                }
            });

            highlightElements(activeIdx, 'center');
        }

        function syncPanesFromRight() {
            const cards = document.querySelectorAll('.restorer-card');
            let activeIdx = 0;
            let minDiff = Infinity;

            cards.forEach((card, i) => {
                const rect = card.getBoundingClientRect();
                const diff = Math.abs(rect.top - 140);
                if (diff < minDiff) {
                    minDiff = diff;
                    activeIdx = i;
                }
            });

            highlightElements(activeIdx, 'right');
        }

        // 화면 강조 처리 및 타겟 이동 통합 제어기
        function highlightElements(idx, triggerZone) {
            // 왼쪽 썸네일 하이라이트
            document.querySelectorAll('.thumb-item').forEach(el => el.classList.remove('active'));
            const activeThumb = document.getElementById(`thumb-${idx}`);
            if (activeThumb) {
                activeThumb.classList.add('active');
                if (triggerZone !== 'left') {
                    activeThumb.scrollIntoView({ block: 'nearest', behavior: 'auto' });
                }
            }

            // 오른쪽 에디터 카드 하이라이트
            document.querySelectorAll('.restorer-card').forEach(el => el.classList.remove('active-card'));
            const activeCard = document.getElementById(`card-wrap-${idx}`);
            if (activeCard) {
                activeCard.classList.add('active-card');
                if (triggerZone === 'center') {
                    activeCard.scrollIntoView({ block: 'nearest', behavior: 'auto' });
                }
            }

            // 가운데 원본 뷰어 이동 (좌측 클릭이나 우측 스크롤 시에만 작동)
            if (triggerZone !== 'center') {
                const activeCenter = document.getElementById(`center-wrap-${idx}`);
                if (activeCenter) {
                    activeCenter.scrollIntoView({ block: 'start', behavior: 'auto' });
                }
            }
        }

        // 왼쪽 썸네일 클릭 시 3단 다이렉트 점프 연동 기능
        function jumpToPage(index) {
            activeHoverZone = 'left'; // 일시적으로 제어권 고정
            highlightElements(index, 'left');
            setTimeout(() => { activeHoverZone = 'center'; }, 100);
        }

        // ==========================================
        // 💡 썸네일 이미지 100% 노출 및 파일 디바인더
        // ==========================================
        function processFiles(files) {
            const thumbContainer = document.getElementById('thumb-container');
            const centerContainer = document.getElementById('center-image-container');
            const cardsArena = document.getElementById('cards-arena');
            const msgBox = document.getElementById('upload-msg-box');

            thumbContainer.innerHTML = ''; centerContainer.innerHTML = ''; cardsArena.innerHTML = '';
            if(msgBox) msgBox.style.display = 'none';

            Array.from(files).forEach((file, index) => {
                const isPDF = file.type === 'application/pdf';
                const fileUrl = URL.createObjectURL(file);

                // 1. 왼쪽 썸네일 생성 (이미지일 경우 안전하게 <img> 주입으로 표시 문제 완전 해결)
                const thumb = document.createElement('div');
                thumb.className = `thumb-item ${isPDF ? 'pdf-type' : ''}`;
                thumb.id = `thumb-${index}`;
                thumb.onclick = () => jumpToPage(index);
                
                if (isPDF) {
                    thumb.innerHTML = `<span style="font-size:24px; margin-bottom:5px;">📄</span>PDF<br><span style="font-size:10px; color:#475569; font-weight:700;">P. ${index + 1}</span>`;
                } else {
                    thumb.innerHTML = `<img src="${fileUrl}" draggable="false"><span class="thumb-page-badge">${index + 1}</span>`;
                }
                thumbContainer.appendChild(thumb);

                // 2. 가운데 원본 프레임 생성
                const centerWrap = document.createElement('div');
                centerWrap.className = 'center-item-wrapper';
                centerWrap.id = `center-wrap-${index}`;
                centerWrap.dataset.id = index;
                centerWrap.innerHTML = `<div class="page-badge">📄 PAGE ${index + 1} 원본</div>`;
                
                let mediaElement = isPDF ? `<iframe src="${fileUrl}#toolbar=0&view=FitH" class="center-item"></iframe>` : `<img src="${fileUrl}" class="center-item">`;
                centerWrap.innerHTML += mediaElement;
                centerContainer.appendChild(centerWrap);

                // 3. 우측 AI 결과물 편집 패널 매핑
                const card = document.createElement('div');
                card.className = 'restorer-card';
                card.id = `card-wrap-${index}`;
                card.dataset.id = index;
                card.innerHTML = `
                    <div class="card-header" onclick="jumpToPage(${index})">
                        <span>🎯 페이지 ${index + 1} 실시간 복원 데이터</span>
                        <button class="btn-copy" onclick="event.stopPropagation(); copyToHWP('preview-${index}')">📋 HWP 1초 복사</button>
                    </div>
                    <div class="card-body">
                        <div class="live-math-preview" id="preview-${index}" contenteditable="true" spellcheck="false">
                            <div class="spinner" style="display:block; margin: 20px auto;"></div>
                            <div style="text-align:center; color:var(--accent-gold); font-size:13px; font-weight:700;">⚡ 3.5 Flash 엔진이 오타율 검수 작업을 처리하고 있습니다...</div>
                        </div>
                    </div>
                `;
                cardsArena.appendChild(card);

                // 통신 라우터 기동
                callGeminiAPI(file, index);
            });

            // 업로드 완료 직후 첫 페이지를 자동으로 하이라이트 세팅
            setTimeout(() => { highlightElements(0, 'left'); }, 300);
        }

        // ==========================================
        // 💡 백틱 코드 블록 및 마크다운 완벽 정화 엔진
        // ==========================================
        async function callGeminiAPI(file, index) {
            const preview = document.getElementById(`preview-${index}`);
            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('http://localhost:4000/api/analyze', { method: 'POST', body: formData });
                const data = await response.json();

                if (response.ok && data.text) {
                    // 💡 코드 블록 백틱 스트링 껍데기 찌꺼기 3중 필터링 멸균기 가동
                    let cleanedText = data.text
                        .replace(/```html/gmi, '') 
                        .replace(/```/g, '')       
                        .replace(/^\s*[-*_]{3,}\s*$/gm, '') 
                        .trim();

                    // 그래머리식 특수 규격 오타 패턴 하이라이팅 처리
                    cleanedText = cleanedText.replace(/([0-9]+[OIlB]+[0-9]+)/g, '<mark class="ocr-warn" title="숫자 사이 알파벳 검출 (오타 의심)">$1</mark>');

                    preview.innerHTML = cleanedText;
                } else {
                    preview.innerHTML = "❌ 에러 발생: " + (data.error || "알 수 없는 오류");
                }
            } catch (error) {
                preview.innerHTML = "❌ <b>서버 연결 실패!</b> 터미널 대기창에서 4000번 서버 가동 상태를 검사해 주세요 형.";
            }
        }

        // 아래한글 테마 오염 복사 세탁 엔진
        function copyToHWP(previewId) {
            const preview = document.getElementById(previewId);
            const sandbox = document.createElement('div');
            sandbox.innerHTML = preview.innerHTML;
            
            // 검사 형광펜 태그 제거 후 문자열 치환 복구
            const marks = sandbox.querySelectorAll('mark.ocr-warn');
            marks.forEach(mark => {
                const textNode = document.createTextNode(mark.textContent);
                mark.parentNode.replaceChild(textNode, mark);
            });
            
            sandbox.style.color = '#000000';
            sandbox.style.backgroundColor = '#ffffff';
            sandbox.style.fontFamily = "'Pretendard', sans-serif";
            
            const allElements = sandbox.querySelectorAll('*');
            allElements.forEach(el => {
                el.style.color = '#000000';
                if (el.tagName === 'TABLE' || el.tagName === 'TH' || el.tagName === 'TD') {
                    el.style.borderColor = '#000000';
                    el.style.borderStyle = 'solid';
                    el.setAttribute('border', '1');
                }
            });

            const blob = new Blob([sandbox.innerHTML], { type: 'text/html' });
            const richText = new ClipboardItem({ 'text/html': blob });
            
            navigator.clipboard.write([richText]).then(() => {
                showToast('🚀 HWP용 리치 텍스트 복사 완료! 한글 프로그램에 Ctrl+V 하세요.');
            }).catch(err => {
                const selection = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(preview);
                selection.removeAllRanges();
                selection.addRange(range);
                document.execCommand('copy');
                selection.removeAllRanges();
                showToast('🚀 HWP용 리치 텍스트 복사 완료!');
            });
        }

        const dropZone = document.getElementById('center-image-container');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
            dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); }, false);
            document.body.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); }, false);
        });
        dropZone.addEventListener('drop', e => { if (e.dataTransfer.files.length > 0) processFiles(e.dataTransfer.files); });

        function showToast(message) {
            const toast = document.getElementById('toast-box');
            toast.innerText = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        window.addEventListener('keydown', e => {
            if ((e.metaKey || e.ctrlKey) && e.key === 's') { 
                e.preventDefault(); 
                showToast('✨ 성공! 데이터가 안전하게 적재되었습니다!'); 
            }
        });
    </script>
</body>
